<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Bunker — Multiplayer</title>
<style>
  html, body { margin: 0; height: 100%; background: #0c0a08; overflow: hidden;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: #ddd; }
  #hud {
    position: fixed; top: 12px; left: 12px; padding: 10px 12px;
    background: rgba(0,0,0,0.45); border: 1px solid #2c2620; border-radius: 6px;
    font-size: 12px; line-height: 1.5; pointer-events: none; user-select: none;
    backdrop-filter: blur(2px); z-index: 30;
  }
  #hud b { color: #ffe9c4; letter-spacing: 0.08em; }
  #hud .keys { color: #aaa; }
</style>
</head>
<body>
<div id="hud">
  <div><b>BUNKER &mdash; MP</b></div>
  <div class="keys">WASD move &middot; Space jump</div>
  <div class="keys">E place &middot; Q break</div>
  <div class="keys" style="margin-top:6px;color:#9ad0ff;">Open in two tabs &middot; share room link</div>
</div>
<script type="module" src="/src/mp.js"></script>
</body>
</html>
